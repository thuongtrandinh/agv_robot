# SLAM Toolbox Configuration (Stabilized - Anti Jitter)

slam_toolbox:
  ros__parameters:
    # --- FRAMES ---
    map_frame: map
    odom_frame: odom
    base_frame: base_footprint
    scan_topic: /scan
    
    mode: mapping

    # --- SOLVER ---
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # --- [FIX 1] TĂNG NGƯỠNG CẬP NHẬT (DEADZONE) ---
    # Robot phải đi dứt khoát mới cập nhật map.
    # Ngăn chặn việc cập nhật liên tục khi đứng yên do nhiễu Lidar.
    minimum_travel_distance: 0.15  # Tăng từ 0.1 lên 0.15m
    minimum_travel_heading: 0.25   # Tăng từ 0.2 lên 0.25 rad (~14 độ)

    # --- [FIX 2] TĂNG ĐỘ KHẮT KHE KHỚP MẪU ---
    # Quan trọng nhất để chống nhảy.
    # Chỉ sửa vị trí nếu Lidar khớp với Map cực tốt (> 0.5).
    # Nếu Lidar nhiễu, điểm số thấp -> Bỏ qua -> Robot đứng yên theo Odom.
    link_match_minimum_response_fine: 0.5  # Tăng mạnh từ 0.1

    scan_buffer_size: 30
    scan_buffer_maximum_scan_distance: 20.0
    link_scan_maximum_distance: 1.5
    
    # --- LOOP CLOSURE ---
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # Search params
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # --- [FIX 3] TIN TƯỞNG ODOMETRY HƠN ---
    # Phạt nặng nếu SLAM cố tình nhảy xa khỏi vị trí Odom báo về.
    distance_variance_penalty: 1.0  # Tăng từ 0.5 -> Tin Odom X,Y
    angle_variance_penalty: 1.0     # Tin Odom Góc
    
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349

    # --- TIMING & TF ---
    minimum_time_interval: 0.5
    transform_publish_period: 0.05 
    map_update_interval: 2.0       

    # --- MAP PARAMS ---
    resolution: 0.05
    max_laser_range: 12.0
    minimum_range: 0.2
    use_scan_matching: true
    use_scan_barycenter: true
    
    # --- SYSTEM ---
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    enable_interactive_mode: true
    throttle_scans: 1