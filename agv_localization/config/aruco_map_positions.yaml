# ArUco Marker Positions in Map Frame
# These are GROUND TRUTH positions from Gazebo world file
# Format: [x, y, z, roll, pitch, yaw] in map frame

aruco_markers:
  marker_0:
    id: 0
    position:
      x: -2.3
      y: 1.7
      z: 0.25
    orientation:
      roll: -1.56    # -π/2 (facing down)
      pitch: 0.0
      yaw: 1.56      # π/2 (rotated)
    size: 0.173       # marker size in meters
    
  marker_1:
    id: 1
    position:
      x: 3.8
      y: -1.2
