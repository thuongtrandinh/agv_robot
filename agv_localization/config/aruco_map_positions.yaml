# Covariance settings for ArUco measurements
covariance:
  # Very low covariance because these are GROUND TRUTH positions
  position_variance: 0.0001    # 1cm² uncertainty (very confident!)
  orientation_variance: 0.001   # ~1.8° uncertainty
  
  # Optional: increase slightly with detection quality
  distance_scaling: 0.00005     # minimal increase with distance
