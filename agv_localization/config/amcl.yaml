amcl:
  ros__parameters:
    # Prefer controlling use_sim_time from the launch file. If you run in simulation
    # pass use_sim_time=True in the launch; leaving it out here avoids mismatches.
    # use_sim_time: False

    # Frames
    global_frame_id: "map"
    odom_frame_id: "odom"
    base_frame_id: "base_footprint"

    # ODOMETRY MODEL - Use wheel encoder + IMU
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    alpha1: 0.1
    alpha2: 0.1
    alpha3: 0.1
    alpha4: 0.1
    alpha5: 0.1

    # Sensor topics
    scan_topic: /scan

    # Transform & timing
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.1
    update_min_d: 0.1

    # Initial pose (floats)
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

    # Particle filter settings
    max_particles: 1000
    min_particles: 200
    pf_err: 0.03
    pf_z: 0.99
    resample_interval: 1

    # Laser model
    laser_model_type: "likelihood_field"
    max_beams: 30
    laser_max_range: 100.0
    laser_min_range: 0.0
    laser_likelihood_max_dist: 2.0

    # Laser model weights
    z_hit: 0.7
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.2
    sigma_hit: 0.18
    lambda_short: 0.1

    # Beam skip (improves performance / ignores inconsistent beams)
    do_beamskip: true
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3

    # Recovery
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0

    # Pose publishing
    save_pose_rate: 0.5