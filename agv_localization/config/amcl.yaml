# ============================================
# AMCL CONFIG CHO ROBOT THẬT
# Adaptive Monte Carlo Localization với LiDAR
# ============================================
amcl:
  ros__parameters:
    # === QUAN TRỌNG: Robot thật ===
    use_sim_time: false
    
    # === TF FRAMES ===
    global_frame_id: "map"
    odom_frame_id: "odom"
    base_frame_id: "base_footprint"
    
    # === TF BROADCAST ===
    # TẮT vì EKF Global sẽ publish TF map->odom
    # AMCL chỉ publish /amcl_pose để EKF Global fuse
    tf_broadcast: false
    transform_tolerance: 0.5  # Giảm để TF chặt chẽ hơn
    
    # === INITIAL POSE ===
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
    
    # === ODOMETRY MODEL ===
    # Differential drive robot
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    
    # Motion noise - Giảm MẠNH để tránh noise khi standing still
    # Particles sẽ tight hơn → AMCL output ổn định hơn
    alpha1: 0.02   # Rotation noise từ rotation (giảm từ 0.1)
    alpha2: 0.02   # Rotation noise từ translation (giảm từ 0.1)
    alpha3: 0.02   # Translation noise từ translation (giảm từ 0.1)
    alpha4: 0.02   # Translation noise từ rotation (giảm từ 0.1)
    alpha5: 0.02   # Translation noise (strafe) (giảm từ 0.1)
    
    # === UPDATE THRESHOLDS ===
    # Robot phải di chuyển bao nhiêu trước khi update
    # Tăng để tránh update quá thường xuyên = giảm noise
    update_min_d: 0.25    # 25cm di chuyển (tăng từ 0.1) - ít noise hơn
    update_min_a: 0.25    # ~14 độ xoay (tăng từ 0.1) - ít noise hơn
    resample_interval: 2  # Resample mỗi 2 update - ổn định hơn
    
    # === LASER MODEL ===
    laser_model_type: "likelihood_field"
    scan_topic: "scan"           # Topic LiDAR của robot thật
    laser_max_range: 12.0        # Phạm vi tối đa LiDAR (meters)
    laser_min_range: 0.15        # Phạm vi tối thiểu
    max_beams: 100               # Tăng số beams để localize chính xác hơn
    
    # Laser probabilities - tune để ổn định khi standing still
    z_hit: 0.85              # Giảm từ 0.9 - balanced confidence
    z_rand: 0.1              # Tăng từ 0.05 - cho phép flexibility
    z_short: 0.025           # Short reading (giữ nguyên)
    z_max: 0.025             # Max range reading (giữ nguyên)
    sigma_hit: 0.2           # TĂNG từ 0.1 - scan matching ít chặt chẽ hơn = ít noise
    laser_likelihood_max_dist: 3.0  # Tăng từ 2.0 - cho phép range lớn hơn
    
    # Beam skip (tăng performance)
    do_beamskip: false
    beam_skip_distance: 0.5
    beam_skip_threshold: 0.3
    beam_skip_error_threshold: 0.9
    
    # === PARTICLES ===
    min_particles: 800     # Tăng từ 500 - hội tụ ổn định hơn
    max_particles: 2500    # Tăng từ 2000 - precision cao hơn
    pf_err: 0.08           # Tăng từ 0.05 - ít resample, ít noise
    pf_z: 0.95             # Giảm từ 0.99 - balanced resample
    
    # === RECOVERY ===
    # Bật recovery để tự phục hồi khi mất track
    recovery_alpha_slow: 0.001   # Slow average weight filter
    recovery_alpha_fast: 0.1     # Fast average weight filter
    
    # === SAVE POSE ===
    save_pose_rate: 0.5