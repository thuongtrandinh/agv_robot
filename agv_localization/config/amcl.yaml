# ============================================
# AMCL CONFIG CHO ROBOT THẬT
# Adaptive Monte Carlo Localization với LiDAR
# ============================================
amcl:
  ros__parameters:
    # === QUAN TRỌNG: Robot thật ===
    use_sim_time: false
    
    # === TF FRAMES ===
    global_frame_id: "map"
    odom_frame_id: "odom"
    base_frame_id: "base_footprint"
    
    # === TF BROADCAST ===
    # TẮT vì EKF Global sẽ publish TF map->odom
    # AMCL chỉ publish /amcl_pose để EKF Global fuse
    tf_broadcast: false
    transform_tolerance: 0.5  # Giảm để TF chặt chẽ hơn
    
    # === INITIAL POSE ===
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
    
    # === ODOMETRY MODEL ===
    # Differential drive robot
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    
    # Motion noise - Giảm để particles hội tụ nhanh và ổn định
    alpha1: 0.1    # Rotation noise từ rotation
    alpha2: 0.1    # Rotation noise từ translation  
    alpha3: 0.1    # Translation noise từ translation
    alpha4: 0.1    # Translation noise từ rotation
    alpha5: 0.1    # Translation noise (strafe)
    
    # === UPDATE THRESHOLDS ===
    # Robot phải di chuyển bao nhiêu trước khi update
    update_min_d: 0.1     # 10cm di chuyển - update thường xuyên hơn
    update_min_a: 0.1     # ~6 độ xoay - update thường xuyên hơn
    resample_interval: 1  # Resample mỗi update
    
    # === LASER MODEL ===
    laser_model_type: "likelihood_field"
    scan_topic: "scan"           # Topic LiDAR của robot thật
    laser_max_range: 12.0        # Phạm vi tối đa LiDAR (meters)
    laser_min_range: 0.15        # Phạm vi tối thiểu
    max_beams: 100               # Tăng số beams để localize chính xác hơn
    
    # Laser probabilities - tune cho hội tụ nhanh
    z_hit: 0.9               # Tăng tin tưởng laser hit
    z_rand: 0.05             # Giảm random noise
    z_short: 0.025           # Short reading
    z_max: 0.025             # Max range reading
    sigma_hit: 0.1           # Giảm std dev để chặt chẽ hơn
    laser_likelihood_max_dist: 2.0
    
    # Beam skip (tăng performance)
    do_beamskip: false
    beam_skip_distance: 0.5
    beam_skip_threshold: 0.3
    beam_skip_error_threshold: 0.9
    
    # === PARTICLES ===
    min_particles: 500     # Tăng để hội tụ tốt hơn
    max_particles: 2000    # Tăng cho độ chính xác
    pf_err: 0.05           # Giảm tolerance
    pf_z: 0.99             # Tăng confidence yêu cầu
    
    # === RECOVERY ===
    # Bật recovery để tự phục hồi khi mất track
    recovery_alpha_slow: 0.001   # Slow average weight filter
    recovery_alpha_fast: 0.1     # Fast average weight filter
    
    # === SAVE POSE ===
    save_pose_rate: 0.5