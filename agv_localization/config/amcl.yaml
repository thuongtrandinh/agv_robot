amcl:
  ros__parameters:
    use_sim_time: false
    
    # Frames
    global_frame_id: "map"
    odom_frame_id: "odom"
    base_frame_id: "base_footprint"

    # --- CẤU HÌNH QUAN TRỌNG CHO FUSION ---
    tf_broadcast: false      # TẮT: Để không đánh nhau với EKF Global
    set_pose_callback: true  # BẬT: Để gửi dữ liệu cho EKF Global đọc

    # 1. ODOMETRY MODEL (Tin cậy Odom)
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    alpha1: 0.05 
    alpha2: 0.05
    alpha3: 0.05
    alpha4: 0.05
    alpha5: 0.05

    # 2. NGƯỠNG CẬP NHẬT
    # Cập nhật thường xuyên để cung cấp data liên tục cho EKF Global
    update_min_d: 0.20
    update_min_a: 0.20

    # 3. LASER MODEL (Cấu hình chống rung Lidar)
    laser_model_type: "likelihood_field"
    max_beams: 60
    z_hit: 0.60
    z_rand: 0.35      # Nhiễu cao
    sigma_hit: 0.5    # Blur rộng
    z_short: 0.05
    z_max: 0.05
    lambda_short: 0.1
    laser_likelihood_max_dist: 4.0

    # 4. PARTICLES
    max_particles: 3000
    min_particles: 1000
    pf_err: 0.05
    pf_z: 0.99
    
    # Misc
    transform_tolerance: 2.0
    set_initial_pose: true
    initial_pose: {x: 0.0, y: 0.0, z: 0.0, yaw: 0.0}