amcl:
  ros__parameters:
    # Prefer controlling use_sim_time from the launch file. If you run in simulation
    # pass use_sim_time=True in the launch; leaving it out here avoids mismatches.
    # use_sim_time: False

    # Frames
    global_frame_id: "map"
    odom_frame_id: "odom"
    base_frame_id: "base_footprint"

    # ODOMETRY MODEL - Trust LiDAR more for orientation
    # Reduced odometry noise → AMCL relies more on scan matching for heading
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    alpha1: 0.005  # Reduced - trust LiDAR for rotation
    alpha2: 0.005  # Reduced - rotation noise from translation
    alpha3: 0.008  # Translation noise (keep moderate)
    alpha4: 0.005  # Reduced - translation noise from rotation
    alpha5: 0.003  # Reduced strafe noise

    # Sensor topics
    scan_topic: /scan

    # Transform & timing - Force continuous updates
    tf_broadcast: true
    transform_tolerance: 0.2  # Tight sync to prevent visual lag
    update_min_a: 0.01  # Update after 0.01 rad (~0.5°) - very frequent
    update_min_d: 0.01  # Update after 1cm translation - very frequent

    # Initial pose (floats)
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

    # Particle filter settings - Aggressive convergence to prevent divergence
    # Kill bad particles quickly, keep only good matches
    max_particles: 3000  # More particles for better initial coverage
    min_particles: 500
    pf_err: 0.01  # Very tight - aggressive convergence
    pf_z: 0.99
    resample_interval: 2  # Resample more often to kill bad particles

    # Laser model - More beams for better orientation accuracy
    laser_model_type: "likelihood_field"
    max_beams: 60  # Doubled - better scan matching for heading
    laser_max_range: 100.0
    laser_min_range: 0.0
    laser_likelihood_max_dist: 1.0  # Tighter - precise matching

    # Laser model weights - Maximum LiDAR trust, kill bad particles
    # Very high z_hit → particles outside map get killed quickly
    z_hit: 0.90  # Maximum - only keep particles that match scan
    z_short: 0.03
    z_max: 0.02
    z_rand: 0.05  # Minimal - almost no tolerance for random noise
    sigma_hit: 0.15  # Very tight - precise scan matching required
    lambda_short: 0.1

    # Beam skip (improves performance / ignores inconsistent beams)
    do_beamskip: true
    beam_skip_distance: 0.3  # More strict about what to skip
    beam_skip_error_threshold: 0.7  # Lower threshold = skip less
    beam_skip_threshold: 0.2  # Keep more beams for accuracy

    # Recovery - Adaptive behavior after convergence
    # After localization converges, these reduce effective alpha (trust odom more)
    recovery_alpha_slow: 0.001  # Slow filter to detect convergence
    recovery_alpha_fast: 0.1    # Fast filter to adapt quickly

    # Pose publishing - Synchronized with odometry/filtered frequency
    save_pose_rate: 10.0  # 10 Hz - conservative rate for reliable synchronization