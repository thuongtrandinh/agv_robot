amcl:
  ros__parameters:
    use_sim_time: false
    
    # Frames
    global_frame_id: "map"
    odom_frame_id: "odom"
    base_frame_id: "base_footprint"

    # TIN TƯỞNG ODOM TUYỆT ĐỐI (Noise cực thấp)
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    alpha1: 0.001 
    alpha2: 0.001
    alpha3: 0.001
    alpha4: 0.001
    alpha5: 0.001

    # QUAN TRỌNG: NGƯỠNG CẬP NHẬT CAO
    # Robot phải đi 0.5m hoặc xoay 0.5 rad (~30 độ) mới tính toán lại vị trí 1 lần
    # Điều này giúp robot KHÔNG BAO GIỜ bị nhảy khi đứng yên
    update_min_d: 2.0
    update_min_a: 2.0

    # Lidar Model (Coi như nhiễu cao)
    laser_model_type: "likelihood_field"
    max_beams: 60
    z_hit: 0.5
    z_rand: 0.5       # Coi 50% dữ liệu lidar là nhiễu
    sigma_hit: 0.2
    
    # Particles
    max_particles: 2000
    min_particles: 500
    
    # Misc
    tf_broadcast: true
    transform_tolerance: 3.0
    set_initial_pose: true
    initial_pose: {x: 0.0, y: 0.0, z: 0.0, yaw: 0.0}