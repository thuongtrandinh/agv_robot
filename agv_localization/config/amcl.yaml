amcl:
  ros__parameters:
    # Prefer controlling use_sim_time from the launch file. If you run in simulation
    # pass use_sim_time=True in the launch; leaving it out here avoids mismatches.
    # use_sim_time: False

    # Frames
    global_frame_id: "map"
    odom_frame_id: "odom"
    base_frame_id: "base_footprint"

    # ODOMETRY MODEL - Use wheel encoder + IMU fused by EKF
    # Lower alpha = trust odometry more (EKF output is very reliable)
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    alpha1: 0.05  # Rotation noise from rotation
    alpha2: 0.05  # Rotation noise from translation
    alpha3: 0.03  # Translation noise from translation
    alpha4: 0.03  # Translation noise from rotation
    alpha5: 0.02  # Strafe noise (not used for differential drive)

    # Sensor topics
    scan_topic: /scan

    # Transform & timing
    tf_broadcast: true
    transform_tolerance: 0.2  # Tight sync to prevent visual lag
    update_min_a: 0.05  # Update after 0.05 rad (~3°) rotation
    update_min_d: 0.05  # Update after 5cm translation

    # Initial pose (floats)
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

    # Particle filter settings - More particles for better tracking
    max_particles: 2000
    min_particles: 500
    pf_err: 0.02  # Lower error threshold for more particles
    pf_z: 0.99
    resample_interval: 1

    # Laser model
    laser_model_type: "likelihood_field"
    max_beams: 30
    laser_max_range: 100.0
    laser_min_range: 0.0
    laser_likelihood_max_dist: 2.0

    # Laser model weights - Trust accurate hits more
    z_hit: 0.8  # Higher weight for correct measurements
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.1  # Lower random noise weight
    sigma_hit: 0.15  # Tighter hit distribution
    lambda_short: 0.1

    # Beam skip (improves performance / ignores inconsistent beams)
    do_beamskip: true
    beam_skip_distance: 0.3  # More strict about what to skip
    beam_skip_error_threshold: 0.7  # Lower threshold = skip less
    beam_skip_threshold: 0.2  # Keep more beams for accuracy

    # Recovery
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0

    # Pose publishing
    save_pose_rate: 0.5