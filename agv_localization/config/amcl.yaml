# ============================================
# AMCL CONFIG CHO ROBOT THẬT
# Adaptive Monte Carlo Localization với LiDAR
# ============================================
amcl:
  ros__parameters:
    # === QUAN TRỌNG: Robot thật ===
    use_sim_time: false
    
    # === TF FRAMES ===
    global_frame_id: "map"
    odom_frame_id: "odom"
    base_frame_id: "base_footprint"
    
    # === TF BROADCAST ===
    # TẮT nếu dùng EKF để publish TF map->odom
    # BẬT nếu AMCL là nguồn localization duy nhất
    tf_broadcast: true
    transform_tolerance: 1.0
    
    # === INITIAL POSE ===
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
    
    # === ODOMETRY MODEL ===
    # Differential drive robot
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    
    # Motion noise - TĂNG để particles spread mượt hơn
    alpha1: 0.1    # Rotation noise từ rotation
    alpha2: 0.1    # Rotation noise từ translation
    alpha3: 0.1    # Translation noise từ translation
    alpha4: 0.1    # Translation noise từ rotation
    
    # === UPDATE THRESHOLDS ===
    # Robot phải di chuyển bao nhiêu trước khi update
    update_min_d: 0.1     # 10cm di chuyển
    update_min_a: 0.2     # ~11 độ xoay
    resample_interval: 1  # Resample mỗi update
    
    # === LASER MODEL ===
    laser_model_type: "likelihood_field"
    scan_topic: "scan"           # Topic LiDAR của robot thật
    laser_max_range: 12.0        # Phạm vi tối đa LiDAR (meters)
    laser_min_range: 0.15        # Phạm vi tối thiểu
    max_beams: 60                # Số beams sử dụng
    
    # Laser probabilities - cân bằng để không jump
    z_hit: 0.7               # Probability of hitting obstacle
    z_rand: 0.2              # Random noise
    z_short: 0.05            # Short reading
    z_max: 0.05              # Max range reading
    sigma_hit: 0.2           # Std dev of hit
    laser_likelihood_max_dist: 2.0
    
    # Beam skip (tăng performance)
    do_beamskip: false
    beam_skip_distance: 0.5
    beam_skip_threshold: 0.3
    beam_skip_error_threshold: 0.9
    
    # === PARTICLES ===
    min_particles: 500
    max_particles: 2000
    pf_err: 0.05
    pf_z: 0.99
    
    # === RECOVERY ===
    # Tắt để không random particles khi mất track
    recovery_alpha_slow: 0.0
    recovery_alpha_fast: 0.0
    
    # === SAVE POSE ===
    save_pose_rate: 0.5