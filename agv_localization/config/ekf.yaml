ekf_filter_node:
  ros__parameters:
    use_sim_time: false
    frequency: 30.0        # 30Hz - đủ nhanh cho real-time
    sensor_timeout: 0.5    # Giảm timeout để phát hiện sensor loss nhanh hơn
    two_d_mode: true
    publish_tf: true
    predict_to_current_time: true
    
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # --- INPUT 1: IMU (chỉ lấy angular velocity, BỎ acceleration để tránh drift) ---
    imu0: /imu
    
    # Config: [x, y, z, roll, pitch, yaw, vx, vy, vz, vroll, vpitch, vyaw, ax, ay, az]
    # Chỉ lấy: vyaw (angular velocity) - BỎ ax để tránh drift từ noise
    imu0_config: [false, false, false, false, false, true, false, false, false, false, false, true, false, false, false]
    imu0_differential: true
    imu0_queue_size: 5
    imu0_remove_gravitational_acceleration: true

    # --- INPUT 2: ODOM (raw - EKF sẽ tự estimate covariance) ---
    odom0: /diff_cont/odom
    # Config: [x, y, z, roll, pitch, yaw, vx, vy, vz, vroll, vpitch, vyaw, ax, ay, az]
    # Lấy: vx (linear velocity), vyaw (angular velocity từ encoder)
    # Sử dụng differential mode để tránh drift từ accumulated position
    odom0_config: [false, false, false, false, false, false, true, false, false, false, false, false, false, false, false]
    odom0_differential: true
    odom0_relative: true
    odom0_queue_size: 5

    # --- Process Noise Covariance (tăng lên để giảm tin tưởng vào prediction khi đứng yên) ---
