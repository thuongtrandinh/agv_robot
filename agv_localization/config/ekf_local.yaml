ekf_local_node:
  ros__parameters:
    use_sim_time: false
    frequency: 20.0
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true
    
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # --- INPUT 1: IMU (raw - EKF sẽ tự estimate covariance) ---
    imu0: /imu
    
    # Config: [x, y, z, roll, pitch, yaw, vx, vy, vz, vroll, vpitch, vyaw, ax, ay, az]
    # Lấy: vyaw (angular velocity), ax (linear acceleration)
    imu0_config: [false, false, false, false, false, false, false, false, false, false, false, true, true, false, false]
    imu0_differential: false
    imu0_queue_size: 5
    imu0_remove_gravitational_acceleration: true

    # --- INPUT 2: ODOM (raw - EKF sẽ tự estimate covariance) ---
    odom0: /diff_cont/odom
    # Config: [x, y, z, roll, pitch, yaw, vx, vy, vz, vroll, vpitch, vyaw, ax, ay, az]
    # Lấy: vx (linear velocity), vyaw (angular velocity từ encoder)
    odom0_config: [false, false, false, false, false, false, true, false, false, false, false, true, false, false, false]
    odom0_differential: false
    odom0_queue_size: 5

